<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratech Portal | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="screenLogin" class="max-w-md w-full bg-white p-10 rounded-[40px] shadow-2xl border text-center space-y-8">
        <h1 class="text-3xl font-black text-blue-600 italic">PRATECH</h1>
        <div class="space-y-4">
            <button type="button" onclick="switchScreen('personel')" class="w-full p-6 bg-slate-50 hover:bg-blue-50 border-2 border-transparent hover:border-blue-200 rounded-3xl transition-all text-left flex items-center gap-4">
                <span class="text-2xl">👤</span>
                <div>
                    <div class="font-bold text-slate-800">Personel Girişi</div>
                    <div class="text-xs text-slate-400 font-medium">Yeni talep oluştur</div>
                </div>
            </button>
            <button type="button" onclick="switchScreen('yonetici')" class="w-full p-6 bg-slate-50 hover:bg-slate-800 group rounded-3xl transition-all text-left flex items-center gap-4">
                <span class="text-2xl">🔑</span>
                <div>
                    <div class="font-bold text-slate-800 group-hover:text-white">Yönetici Paneli</div>
                    <div class="text-xs text-slate-400 group-hover:text-slate-500">Talepleri yönet</div>
                </div>
            </button>
        </div>
    </div>

    <div id="screenPersonel" class="hidden max-w-4xl w-full bg-white p-8 rounded-[40px] shadow-2xl border space-y-6">
        <div class="flex justify-between items-center border-b pb-4">
            <button type="button" onclick="logout()" class="text-slate-400 font-bold text-xs uppercase">← GERİ</button>
            <h2 class="text-xl font-black">İZİN BAŞVURUSU</h2>
            <span id="gun" class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">0 GÜN</span>
        </div>
        <form id="izinForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <input type="text" id="ad_soyad" placeholder="Ad Soyad" class="md:col-span-2 p-4 bg-slate-50 border rounded-2xl outline-none" required>
            <select id="izin_turu" class="md:col-span-2 p-4 bg-slate-50 border rounded-2xl outline-none font-bold">
                <option>Yıllık İzin</option>
                <option>Sağlık İzni</option>
                <option>Mazeret İzni</option>
            </select>
            <input type="date" id="baslangic" class="p-4 bg-slate-50 border rounded-2xl font-bold" required onchange="calc()">
            <input type="date" id="bitis" class="p-4 bg-slate-50 border rounded-2xl font-bold" required onchange="calc()">
            <textarea id="aciklama" rows="3" class="md:col-span-2 p-4 bg-slate-50 border rounded-2xl outline-none resize-none" placeholder="Açıklama giriniz..." required></textarea>
            <button type="submit" class="md:col-span-2 bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all">GÖNDER</button>
        </form>
    </div>

    <div id="screenYonetici" class="hidden max-w-5xl w-full bg-white p-8 rounded-[40px] shadow-2xl border space-y-6">
        <div class="flex justify-between items-center border-b pb-4">
            <button type="button" onclick="logout()" class="text-slate-400 font-bold text-xs uppercase">← ÇIKIŞ</button>
            <h2 class="text-xl font-black italic text-center">ONAY MERKEZİ</h2>
            <span id="cnt" class="bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase">0 TALEP</span>
        </div>
        <div class="overflow-hidden border rounded-[30px]">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                    <tr>
                        <th class="p-6">PERSONEL</th>
                        <th class="p-6">İZİN</th>
                        <th class="p-6 text-center">DURUM</th>
                        <th class="p-6 text-right">AKSİYON</th>
                    </tr>
                </thead>
                <tbody id="list" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
